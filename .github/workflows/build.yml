name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'

      - name: Find project root
        run: |
          PROJ=$(find . -name "pubspec.yaml" -not -path "*/.*" | head -1 | xargs dirname)
          echo "Found project at: $PROJ"
          echo "PROJECT_DIR=$PROJ" >> $GITHUB_ENV

      - name: Get app version
        run: |
          VERSION=$(grep '^version:' ${{ env.PROJECT_DIR }}/pubspec.yaml | sed 's/version: //;s/+.*//' | tr -d ' ')
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version: $VERSION"

      - name: Generate Android structure
        run: |
          flutter create --project-name ha_alarm --org com.homeassistant /tmp/flutter_base
          cp -r /tmp/flutter_base/android ${{ env.PROJECT_DIR }}/
          cp -r /tmp/flutter_base/test    ${{ env.PROJECT_DIR }}/

      - name: Clear Gradle cache
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/wrapper/

      - name: Patch AndroidManifest
        run: |
          python3 << 'PYEOF'
          import os
          proj = os.environ['PROJECT_DIR']
          path = f'{proj}/android/app/src/main/AndroidManifest.xml'

          with open(path, 'r') as f:
              txt = f.read()

          # 1. Add usesCleartextTraffic
          txt = txt.replace(
              '<application',
              '<application android:usesCleartextTraffic="true"'
          )

          # 2. Change app label
          txt = txt.replace(
              'android:label="ha_alarm"',
              'android:label="Alarma Casa"'
          )

          # 3. Add widget receivers before </application>
          receivers = "    <receiver android:name=\".AlarmWidget\" android:exported=\"true\">\n      <intent-filter>\n        <action android:name=\"android.appwidget.action.APPWIDGET_UPDATE\"/>\n      </intent-filter>\n      <meta-data android:name=\"android.appwidget.provider\" android:resource=\"@xml/alarm_widget_info\"/>\n    </receiver>\n    <receiver android:name=\".AlarmWidgetWide\" android:exported=\"true\">\n      <intent-filter>\n        <action android:name=\"android.appwidget.action.APPWIDGET_UPDATE\"/>\n      </intent-filter>\n      <meta-data android:name=\"android.appwidget.provider\" android:resource=\"@xml/alarm_widget_wide_info\"/>\n    </receiver>\n"
          txt = txt.replace('</application>', receivers + '  </application>')

          with open(path, 'w') as f:
              f.write(txt)

          print('Manifest patched successfully')
          PYEOF

      - name: Clear Gradle cache
        run: |
          rm -rf ~/.gradle/caches/ || true
          rm -rf ~/.gradle/wrapper/ || true

      - name: Inject Firebase options
        env:
          FIREBASE_API_KEY:          ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID:           ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER: ${{ secrets.FIREBASE_MESSAGING_SENDER }}
          FIREBASE_PROJECT_ID:       ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:   ${{ secrets.FIREBASE_STORAGE_BUCKET }}
        run: |
          cat > ${{ env.PROJECT_DIR }}/lib/firebase_options.dart << EOF
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => android;

            static const FirebaseOptions android = FirebaseOptions(
              apiKey:            '$FIREBASE_API_KEY',
              appId:             '$FIREBASE_APP_ID',
              messagingSenderId: '$FIREBASE_MESSAGING_SENDER',
              projectId:         '$FIREBASE_PROJECT_ID',
              storageBucket:     '$FIREBASE_STORAGE_BUCKET',
            );
          }
          EOF

      - name: Setup Google Services JSON
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode \
            > ${{ env.PROJECT_DIR }}/android/app/google-services.json

      - name: Setup keystore and signing
        env:
          KEYSTORE_BASE64:   ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > ${{ env.PROJECT_DIR }}/android/app/ha_alarm.jks
          GRADLE=${{ env.PROJECT_DIR }}/android/app/build.gradle
          echo "" >> $GRADLE
          echo "android.signingConfigs.create('release_config') {" >> $GRADLE
          echo "    storeFile file('ha_alarm.jks')" >> $GRADLE
          echo "    storePassword '$KEYSTORE_PASSWORD'" >> $GRADLE
          echo "    keyAlias '$KEY_ALIAS'" >> $GRADLE
          echo "    keyPassword '$KEY_PASSWORD'" >> $GRADLE
          echo "}" >> $GRADLE
          echo "android.buildTypes.release.signingConfig = android.signingConfigs.getByName('release_config')" >> $GRADLE

      - name: Install widget resources
        run: |
          mkdir -p ${{ env.PROJECT_DIR }}/android/app/src/main/res/layout
          mkdir -p ${{ env.PROJECT_DIR }}/android/app/src/main/res/xml
          cp ${{ env.PROJECT_DIR }}/android_res/layout/alarm_widget.xml \
             ${{ env.PROJECT_DIR }}/android/app/src/main/res/layout/alarm_widget.xml
          cp ${{ env.PROJECT_DIR }}/android_res/layout/alarm_widget_wide.xml \
             ${{ env.PROJECT_DIR }}/android/app/src/main/res/layout/alarm_widget_wide.xml
          cp ${{ env.PROJECT_DIR }}/android_res/xml/alarm_widget_info.xml \
             ${{ env.PROJECT_DIR }}/android/app/src/main/res/xml/alarm_widget_info.xml
          cp ${{ env.PROJECT_DIR }}/android_res/xml/alarm_widget_wide_info.xml \
             ${{ env.PROJECT_DIR }}/android/app/src/main/res/xml/alarm_widget_wide_info.xml
          KOTLIN_DIR=${{ env.PROJECT_DIR }}/android/app/src/main/kotlin/com/homeassistant/ha_alarm
          mkdir -p $KOTLIN_DIR
          cp ${{ env.PROJECT_DIR }}/android_res/AlarmWidget.kt $KOTLIN_DIR/AlarmWidget.kt
          cp ${{ env.PROJECT_DIR }}/android_res/MainActivity.kt $KOTLIN_DIR/MainActivity.kt

      - name: Get dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter pub get

      - name: Generate launcher icons
        working-directory: ${{ env.PROJECT_DIR }}
        run: dart run flutter_launcher_icons

      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ha-alarm-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: v${{ env.APP_VERSION }}
          files: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
