name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Find project root
        run: |
          PROJ=$(find . -name "pubspec.yaml" -not -path "*/.*" | head -1 | xargs dirname)
          echo "Found project at: $PROJ"
          echo "PROJECT_DIR=$PROJ" >> $GITHUB_ENV

      - name: Generate Android structure
        run: |
          flutter create --project-name ha_alarm --org com.homeassistant /tmp/flutter_base
          cp -r /tmp/flutter_base/android ${{ env.PROJECT_DIR }}/
          cp -r /tmp/flutter_base/test    ${{ env.PROJECT_DIR }}/

      - name: Patch AndroidManifest
        run: |
          MANIFEST=${{ env.PROJECT_DIR }}/android/app/src/main/AndroidManifest.xml
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"\/>\n    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES"\/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"\/>' $MANIFEST

      - name: Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ env.PROJECT_DIR }}/android/app/ha_alarm.jks
          cat >> ${{ env.PROJECT_DIR }}/android/app/build.gradle << 'GRADLE'

android {
    signingConfigs {
        release {
            storeFile file("ha_alarm.jks")
            storePassword "${{ secrets.KEYSTORE_PASSWORD }}"
            keyAlias "${{ secrets.KEY_ALIAS }}"
            keyPassword "${{ secrets.KEY_PASSWORD }}"
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}
GRADLE

      - name: Get dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter pub get

      - name: Generate launcher icons
        working-directory: ${{ env.PROJECT_DIR }}
        run: dart run flutter_launcher_icons

      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ha-alarm-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
